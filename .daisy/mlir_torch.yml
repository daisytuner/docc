on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

parameters:
  container: daisytuner/docc-build-env-llvm19-base:latest-amd64
  timeout: 120
  partitions:
    - chamomile

steps:
  build: |
    add-apt-repository ppa:deadsnakes/ppa -y
    apt-get update

    apt-get install -y python3.11 python3.11-dev python3.11-venv

    python3.11 -m venv venv
    . venv/bin/activate

    python -m pip install --upgrade pip
    pip install pybind11 pytest coverage black==25.9.0 build scikit-build-core
    pip install numpy scipy

    pip install --no-build-isolation -v -e python/
    pip install --no-build-isolation -v -e mlir/

    pip install torch-mlir torchvision --extra-index-url https://download.pytorch.org/whl/cpu -f https://github.com/llvm/torch-mlir-release/releases/expanded_assets/dev-wheels

  run:
    linear_torch:
      command: venv/bin/python3 mlir/benchmarks/torch/linear.py --torch
      energy: true
      env:
        DOCC_CI: regions
    linear_none:
      command: venv/bin/python3 mlir/benchmarks/torch/linear.py --docc --target=none
      energy: true
      env:
        DOCC_CI: regions
    matmul_torch:
      command: venv/bin/python3 mlir/benchmarks/torch/matmul.py --torch
      energy: true
      env:
        DOCC_CI: regions
    matmul_none:
      command: venv/bin/python3 mlir/benchmarks/torch/matmul.py --docc --target=none
      energy: true
      env:
        DOCC_CI: regions
